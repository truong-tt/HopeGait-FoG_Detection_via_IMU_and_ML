name: HopeGait AI Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      - name: Run HopeGait AI Agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python agent/hopegait_agent.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hopegait-agent-report
          path: reports/
          retention-days: 30

      # Smoke-train against the synthetic pool. Proves the agent's .npy
      # layout still loads cleanly into dataset.py and trains end-to-end —
      # not a production checkpoint (CPU-only, 2 epochs, synth-only).
      - name: Install training dependencies
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Smoke-train one synthetic fold
        env:
          HOPEGAIT_PROCESSED_DATA_DIR: data/synthetic
          PYTHONPATH: src
        run: |
          TEST_SUBJ=$(python -c "import glob, os; \
            f = sorted(glob.glob('data/synthetic/win_128/subj_*_x.npy'))[0]; \
            print(os.path.basename(f).split('_')[1])")
          echo "Smoke-train test subject: $TEST_SUBJ"
          python src/training/train.py --window 128 --subject "$TEST_SUBJ" \
            --epochs 2 --no-amp --device cpu

      - name: Evaluate the trained fold
        env:
          HOPEGAIT_PROCESSED_DATA_DIR: data/synthetic
          PYTHONPATH: src
        run: python src/training/evaluate.py

      - name: Upload synthetic data + smoke checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hopegait-synth-smoke
          path: |
            data/synthetic/
            models/
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          {
            echo "## HopeGait AI Agent Run"
            echo ""
            echo "**Workflow:** \`${{ github.workflow }}\`  "
            echo "**Trigger:** \`${{ github.event_name }}\`  "
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "### Reports generated"
            echo ""
            echo '```'
            ls -la reports/ || echo "(no reports directory)"
            echo '```'
            echo ""
            echo "Token totals are printed in the previous step's run logs."
            echo "The latest report markdown is attached as an artifact:"
            echo "**\`hopegait-agent-report\`** (30-day retention)."
          } >> "$GITHUB_STEP_SUMMARY"
